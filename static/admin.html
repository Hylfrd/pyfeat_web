<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experimenter Dashboard — Co-Writing Study</title>
<link rel="stylesheet" href="/static/admin.css?v=__ASSET_VERSION__">
</head>
<body>

<div id="auth-overlay" class="auth-overlay">
  <form id="auth-form" class="auth-card">
    <h2>Admin Token</h2>
    <p>请输入后台 token 进入实验管理页面。</p>
    <input id="auth-token" type="password" autocomplete="current-password" placeholder="Token">
    <button class="primary" type="submit">进入后台</button>
    <div id="auth-error" class="auth-error"></div>
  </form>
</div>

<!-- ═══ Sidebar ═══ -->
<div id="sidebar">
  <div class="head">
    <h1>Experimenter Dashboard</h1>
    <div class="sub">Co-Writing Emotion AI Study · BNBU FST</div>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="filters">
    <input id="search" type="text" placeholder="搜索 ID / 参与者..." oninput="renderList()">
    <select id="filter-cond" onchange="renderList()">
      <option value="all">全部条件</option>
      <option value="affect-aware">情感感知</option>
      <option value="text-only">纯文本</option>
    </select>
  </div>
  <div id="session-list"></div>
</div>

<!-- ═══ Main Panel ═══ -->
<div id="main">
  <div id="tabs">
    <button data-tab="overview">概览</button>
    <button data-tab="chat">对话记录</button>
    <button data-tab="expression">表情数据</button>
    <button data-tab="baseline">基线数据</button>
    <button data-tab="debug" class="active">日志</button>
  </div>
  <div id="detail">
    <div class="empty-state">
      <div class="icon">...</div>
      <p>日志加载中</p>
    </div>
  </div>
</div>

<div id="modal-overlay" class="hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal"></div>
</div>
<div id="toast-container"></div>

<script src="/static/admin.js?v=__ASSET_VERSION__"></script>
</body>
</html>
