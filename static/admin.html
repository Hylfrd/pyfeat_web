<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experimenter Dashboard — Co-Writing Study</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f172a;color:#e2e8f0;height:100vh;overflow:hidden;display:flex;
}

/* ── Sidebar ── */
#sidebar{
  width:380px;min-width:380px;background:#1e293b;border-right:1px solid #334155;
  display:flex;flex-direction:column;height:100vh;
}
#sidebar .head{
  padding:20px;border-bottom:1px solid #334155;flex-shrink:0;
}
#sidebar .head h1{font-size:1.1em;font-weight:700;letter-spacing:-.02em;color:#f1f5f9}
#sidebar .head .sub{font-size:.68em;color:#64748b;margin-top:2px}

/* Stats row */
#sidebar .stats-row{
  display:flex;gap:1px;background:#334155;flex-shrink:0;
}
#sidebar .stats-row .stat{
  flex:1;background:#1e293b;text-align:center;padding:12px 8px;
}
#sidebar .stats-row .stat .val{font-size:1.3em;font-weight:800;letter-spacing:-.02em}
#sidebar .stats-row .stat .lbl{font-size:.58em;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-top:2px}
.stat .val.green{color:#22c55e}.stat .val.amber{color:#f59e0b}.stat .val.indigo{color:#818cf8}

/* Search & filters */
#sidebar .filters{padding:12px 16px;border-bottom:1px solid #1e293b;flex-shrink:0;display:flex;gap:8px}
#sidebar .filters input,#sidebar .filters select{
  background:#0f172a;border:1px solid #334155;border-radius:8px;
  padding:8px 12px;font-size:.78em;color:#e2e8f0;font-family:inherit;
}
#sidebar .filters input{flex:1}
#sidebar .filters input:focus,#sidebar .filters select:focus{outline:none;border-color:#6366f1}
#sidebar .filters select{width:100px}

/* Session list */
#session-list{flex:1;overflow-y:auto;padding:0}
.session-item{
  padding:12px 16px;border-bottom:1px solid #1e293b;cursor:pointer;
  transition:background .12s;display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.session-item:hover{background:rgba(99,102,241,.06)}
.session-item.active{background:rgba(99,102,241,.12);border-left:3px solid #6366f1}
.session-item .left{flex:1;min-width:0}
.session-item .left .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.session-item .left .pid{font-family:monospace;font-weight:700;font-size:.88em;color:#f1f5f9}
.session-item .left .meta{font-size:.68em;color:#64748b;display:flex;gap:12px}
.session-item .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.session-item .right .turns{font-size:.72em;font-weight:700;color:#94a3b8}

.badge{
  display:inline-block;font-size:.62em;padding:2px 8px;border-radius:5px;
  font-weight:700;text-transform:uppercase;letter-spacing:.04em;
}
.badge.affect{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.25)}
.badge.text{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.25)}
.badge.s{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}

.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.done{background:#22c55e}.status-dot.pending{background:#f59e0b}.status-dot.excl{background:#ef4444}
.excluded .pid{text-decoration:line-through;text-decoration-color:#ef4444}

/* ── Main Panel ── */
#main{
  flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
#main .empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#475569;gap:12px;
}
#main .empty-state .icon{font-size:3em;opacity:.3}

/* Tabs */
#tabs{
  display:flex;gap:0;border-bottom:1px solid #334155;flex-shrink:0;padding:0 24px;
  background:#1e293b;
}
#tabs button{
  padding:12px 20px;font-size:.75em;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:#64748b;background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;transition:all .15s;font-family:inherit;
}
#tabs button:hover{color:#e2e8f0}
#tabs button.active{color:#818cf8;border-bottom-color:#6366f1}

/* Detail content */
#detail{flex:1;overflow-y:auto;padding:24px}
.detail-section{margin-bottom:28px}
.detail-section h3{
  font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:#64748b;margin-bottom:12px;
}

/* Info grid */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.info-card{
  background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px 16px;
}
.info-card .lbl{font-size:.6em;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:4px}
.info-card .val{font-size:1em;font-weight:700;color:#f1f5f9}
.info-card .val.mono{font-family:monospace}

/* Action bar */
.action-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
button{
  padding:8px 16px;border-radius:10px;font-size:.78em;font-weight:600;
  border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;
  transition:all .15s;font-family:inherit;white-space:nowrap;
}
button:hover{background:#334155}
button.primary{background:#4f46e5;border-color:#4f46e5;color:#fff}
button.primary:hover{background:#4338ca}
button.danger{background:transparent;border-color:#dc2626;color:#dc2626}
button.danger:hover{background:#dc2626;color:#fff}

.auth-overlay{
  position:fixed;inset:0;z-index:500;background:#0f172a;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.auth-overlay.hidden{display:none}
.auth-card{
  width:min(420px,100%);background:#1e293b;border:1px solid #334155;border-radius:14px;
  padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.35);
}
.auth-card h2{font-size:1.2em;margin-bottom:8px;color:#f8fafc}
.auth-card p{font-size:.78em;color:#94a3b8;line-height:1.6;margin-bottom:16px}
.auth-card input{
  width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;
  color:#e2e8f0;padding:12px 14px;font:inherit;margin-bottom:12px;
}
.auth-card input:focus{outline:none;border-color:#6366f1}
.auth-card button{width:100%;justify-content:center}
.auth-error{min-height:18px;margin-top:10px;color:#fca5a5;font-size:.78em}

/* Expression strip */
.au-strip{display:flex;gap:1px;flex-wrap:wrap;margin:12px 0}
.au-strip .cell{width:5px;height:24px;border-radius:1px;opacity:.85;cursor:pointer}
.au-strip .cell:hover{opacity:1;transform:scaleY(1.5)}
.au-strip .cell.lost{opacity:.25}

.au-legend{display:flex;gap:16px;font-size:.65em;color:#64748b;margin-bottom:8px;flex-wrap:wrap}
.au-legend span{display:flex;align-items:center;gap:5px}
.au-legend .swatch{width:10px;height:10px;border-radius:2px}

/* AU chart */
.au-chart-wrap{margin:16px 0;overflow-x:auto}
#au-chart{width:100%;min-width:600px}

/* Chat log */
.chat-entry{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #1e293b}
.chat-entry:last-child{border-bottom:none}
.chat-entry .ch-meta{font-size:.65em;color:#64748b;margin-bottom:4px;display:flex;gap:12px;flex-wrap:wrap}
.chat-entry .ch-meta .tag{
  display:inline-block;padding:1px 7px;border-radius:4px;font-size:.9em;
}
.chat-entry .ch-meta .tag.expr{background:rgba(99,102,241,.12);color:#818cf8}
.chat-entry .ch-meta .tag.strat{background:rgba(245,158,11,.12);color:#fbbf24}
.chat-entry .ch-content{font-size:.82em;line-height:1.6;color:#cbd5e1;padding:8px 12px;border-radius:10px}
.chat-entry.user .ch-content{background:rgba(99,102,241,.08);border-left:3px solid #6366f1}
.chat-entry.ai .ch-content{background:rgba(15,23,42,.5);border-left:3px solid #475569}

/* Expression frame table */
.frame-table{width:100%;border-collapse:collapse;font-size:.75em}
.frame-table th{
  text-align:left;padding:6px 10px;background:#0f172a;font-size:.7em;
  text-transform:uppercase;letter-spacing:.06em;color:#64748b;position:sticky;top:0;z-index:1;
}
.frame-table td{padding:4px 10px;border-bottom:1px solid #1e293b;font-family:monospace;font-size:.85em}
.frame-table tr:hover td{background:rgba(99,102,241,.04)}
.frame-table .lost{opacity:.4}
.frame-table .trigger{color:#fbbf24;font-weight:700}
.debug-tools{display:grid;grid-template-columns:1fr 140px 140px 120px;gap:10px;margin:12px 0 16px}
.debug-tools input,.debug-tools select,.debug-tools button{
  background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;
  padding:9px 12px;font-family:inherit;font-size:.78em;
}
.debug-tools input:focus,.debug-tools select:focus{outline:none;border-color:#6366f1}
.debug-meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;color:#64748b;font-size:.74em;margin:0 0 10px}
.debug-pager{display:flex;justify-content:center;padding:12px;border-top:1px solid #334155;background:#0f172a}
.debug-console-bar,.debug-test-bar{
  display:flex;gap:10px;align-items:stretch;flex-wrap:wrap;margin-bottom:12px;
}
.debug-console-bar button,.debug-test-bar button{min-height:42px}
.debug-status-card,.debug-cache-card{
  min-height:42px;display:flex;align-items:center;gap:8px;border:1px solid #334155;border-radius:10px;
  background:#0f172a;padding:8px 12px;font-size:.78em;color:#cbd5e1;
}
.debug-status-card.ok{border-color:rgba(34,197,94,.45);color:#86efac}
.debug-status-card.err{border-color:rgba(239,68,68,.45);color:#fca5a5}
.debug-cache-card{color:#94a3b8}
.debug-result{
  margin:0 0 12px;max-height:180px;overflow:auto;background:#020617;border:1px solid #334155;
  border-radius:8px;padding:10px;color:#cbd5e1;font-size:.75em;line-height:1.5;white-space:pre-wrap;
}
.debug-result:empty{display:none}
.debug-table-wrap{max-height:560px;overflow:auto;border:1px solid #334155;border-radius:10px}
.debug-box{
  border:1px solid #334155;border-radius:10px;background:#0f172a;padding:12px;margin-bottom:14px;
}
.debug-box h4{font-size:.72em;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:10px}
.debug-box pre{
  margin-top:10px;max-height:220px;overflow:auto;background:#020617;border:1px solid #334155;
  border-radius:8px;padding:10px;color:#cbd5e1;font-size:.75em;line-height:1.5;white-space:pre-wrap;
}
.debug-details summary{cursor:pointer;color:#818cf8;font-weight:700}
.debug-details pre{
  margin-top:8px;max-height:260px;overflow:auto;background:#020617;border:1px solid #334155;
  border-radius:8px;padding:10px;color:#cbd5e1;font-size:.82em;line-height:1.5;white-space:pre-wrap;
}
.debug-face{
  margin-top:10px;display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:start;
}
.debug-face img{
  width:160px;max-height:120px;object-fit:contain;border:1px solid #334155;border-radius:8px;background:#020617;
}
.debug-face a{display:inline-block;margin-top:8px;color:#818cf8;text-decoration:none;font-weight:700}
@media(max-width:900px){
  .debug-tools{grid-template-columns:1fr}
  .debug-face{grid-template-columns:1fr}
  .debug-face img{width:100%;max-height:220px}
}

/* Loading */
.loading{text-align:center;padding:40px;color:#64748b}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:24px;height:24px;border:3px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;
  padding:10px 24px;border-radius:10px;font-size:.82em;font-weight:600;
  animation:toastIn .25s ease,toastOut .25s ease 2.5s forwards;
}
.toast.ok{background:#065f46;color:#d1fae5}
.toast.err{background:#7f1d1d;color:#fecaca}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* Confirm modal */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
  display:none;align-items:center;justify-content:center;
}
#modal-overlay:not(.hidden){
  display:flex;
}
#modal-overlay .modal{
  background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px;
  max-width:400px;width:90%;
}
#modal-overlay .modal h3{font-size:1em;margin-bottom:8px}
#modal-overlay .modal p{font-size:.82em;color:#94a3b8;margin-bottom:20px}
</style>
</head>
<body>

<div id="auth-overlay" class="auth-overlay">
  <form id="auth-form" class="auth-card">
    <h2>Admin Token</h2>
    <p>请输入后台 token 进入实验管理页面。</p>
    <input id="auth-token" type="password" autocomplete="current-password" placeholder="Token">
    <button class="primary" type="submit">进入后台</button>
    <div id="auth-error" class="auth-error"></div>
  </form>
</div>

<!-- ═══ Sidebar ═══ -->
<div id="sidebar">
  <div class="head">
    <h1>Experimenter Dashboard</h1>
    <div class="sub">Co-Writing Emotion AI Study · BNBU FST</div>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="filters">
    <input id="search" type="text" placeholder="搜索 ID / 参与者..." oninput="renderList()">
    <select id="filter-cond" onchange="renderList()">
      <option value="all">全部条件</option>
      <option value="affect-aware">情感感知</option>
      <option value="text-only">纯文本</option>
    </select>
  </div>
  <div id="session-list"></div>
</div>

<!-- ═══ Main Panel ═══ -->
<div id="main">
  <div id="tabs">
    <button data-tab="overview">概览</button>
    <button data-tab="chat">对话记录</button>
    <button data-tab="expression">表情数据</button>
    <button data-tab="baseline">基线数据</button>
    <button data-tab="debug" class="active">日志</button>
  </div>
  <div id="detail">
    <div class="empty-state">
      <div class="icon">...</div>
      <p>日志加载中</p>
    </div>
  </div>
</div>

<div id="modal-overlay" class="hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal"></div>
</div>
<div id="toast-container"></div>

<script>
const $=id=>document.getElementById(id);
let sessions=[],activeSid=null,sessionCache={};
let debugEvents=[];
let debugBefore=null;
let debugHasMore=false;
let debugEnabled=false;
let debugLoading=false;
let debugFilterTimer=null;
let debugPollTimer=null;
let debugHealthTimer=null;
let debugCacheTimer=null;
let debugAutoFollow=true;
let activeTab='debug';
let refreshTimer=null;
const DEBUG_LIMIT=80;
const DEBUG_POLL_MS=100;
const DEBUG_HEALTH_MS=10000;

function showAuth(message=''){
  $('auth-overlay').classList.remove('hidden');
  $('auth-error').textContent=message;
  setTimeout(()=>$('auth-token')?.focus(),0);
  if(refreshTimer){
    clearInterval(refreshTimer);
    refreshTimer=null;
  }
}

function hideAuth(){
  $('auth-overlay').classList.add('hidden');
  $('auth-error').textContent='';
  if(!refreshTimer)refreshTimer=setInterval(refresh,10000);
}

async function adminFetch(url,opts={}){
  const r=await fetch(url,{...opts,credentials:'same-origin'});
  if(r.status===401){
    showAuth('Token 已失效，请重新输入。');
    throw new Error('unauthorized');
  }
  return r;
}

$('auth-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const token=$('auth-token').value.trim();
  if(!token){
    $('auth-error').textContent='请输入 token。';
    return;
  }
  const body=new URLSearchParams();
  body.set('token',token);
  const r=await fetch('/api/admin/login',{method:'POST',body,credentials:'same-origin'});
  if(!r.ok){
    $('auth-error').textContent='Token错误';
    return;
  }
  $('auth-token').value='';
  hideAuth();
  await refresh();
  renderActiveTab();
});

async function initAuth(){
  const r=await fetch('/api/admin/auth',{credentials:'same-origin'});
  if(!r.ok){
    showAuth();
    return;
  }
  hideAuth();
  await refresh();
  renderActiveTab();
}

// ── Fetch & render ──
async function refresh(){
  const r=await adminFetch('/api/admin/sessions');
  sessions=await r.json();
  renderStats();
  renderList();
  if(activeTab!=='debug'&&activeSid)await loadSession(activeSid,true);
}
async function renderStats(){
  const done=sessions.filter(s=>s.completed);
  const excl=sessions.filter(s=>s.excluded);
  $('stats-row').innerHTML=`
    <div class="stat"><div class="val green">${done.length}</div><div class="lbl">已完成</div></div>
    <div class="stat"><div class="val indigo">${sessions.length}</div><div class="lbl">总计</div></div>
    <div class="stat"><div class="val amber">${excl.length}</div><div class="lbl">已排除</div></div>
  `;
}
function renderList(){
  const q=($('search').value||'').toLowerCase();
  const cond=$('filter-cond').value;
  let filtered=sessions;
  if(q)filtered=filtered.filter(s=>(s.participant_id||'').toLowerCase().includes(q)||String(s.id).includes(q));
  if(cond!=='all')filtered=filtered.filter(s=>s.condition===cond);

  let html='';
  for(const s of filtered){
    const dur=s.duration_ms?Math.floor(s.duration_ms/1000)+'s':'';
    const loss=s.frame_loss_ratio>0.3?`<span style="color:#ef4444">⚠${Math.round(s.frame_loss_ratio*100)}%</span>`:'';
    html+=`<div class="session-item ${s.id===activeSid?'active':''} ${s.excluded?'excluded':''}"
      onclick="selectSession(${s.id})">
      <div class="left">
        <div class="top">
          <span class="pid">${escHtml(s.participant_id)}</span>
          <span class="badge ${s.condition==='affect-aware'?'affect':'text'}">${s.condition==='affect-aware'?'情感感知':'纯文本'}</span>
          <span class="badge s">场景${s.task_scenario}</span>
        </div>
        <div class="meta">
          <span>#${s.id}</span>
          <span>顺序${s.condition_order}</span>
          <span>${s.completion_type||'进行中'}</span>
          ${loss}
        </div>
      </div>
      <div class="right">
        <div class="status-dot ${s.completed?'done':(s.excluded?'excl':'pending')}" title="${s.completed?'完成':'进行中'}"></div>
        <span class="turns">${s.total_turns||0}轮</span>
      </div>
    </div>`;
  }
  $('session-list').innerHTML=html||'<div style="padding:32px;text-align:center;color:#475569;font-size:.82em">无匹配的 Session</div>';
}

// ── Session selection ──
async function selectSession(sid){
  activeSid=sid;
  activeTab='overview';
  renderList();
  await loadSession(sid);
}
async function loadSession(sid,silent=false){
  if(!silent){$('detail').innerHTML='<div class="loading"><div class="spinner"></div><p>加载中...</p></div>'}

  // Fetch data
  const [exportR,statsR]=await Promise.all([
    adminFetch(`/api/admin/sessions/${sid}/export`),
    adminFetch(`/api/admin/expression/${sid}/stats`)
  ]);
  const exp=await exportR.json();
  const st=await statsR.json();
  sessionCache[sid]={exp,st};

  setActiveTab(activeTab);
  renderActiveTab();
}

// ── Tab switching ──
$('tabs').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  activeTab=e.target.dataset.tab;
  setActiveTab(activeTab);
  renderActiveTab();
});

function setActiveTab(tab){
  $('tabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
}

function renderActiveTab(){
  const {exp,st}=sessionCache[activeSid]||{};
  if(activeTab==='debug'){
    renderDebug();
    return;
  }
  stopDebugTimers();
  if(!exp){
    $('detail').innerHTML='<div class="empty-state"><div class="icon">←</div><p>从左侧选择一个 Session 查看详情</p></div>';
    return;
  }
  if(activeTab==='overview')renderOverview(exp,st);
  if(activeTab==='chat')renderChat(exp);
  if(activeTab==='expression')renderExpression(exp,st);
  if(activeTab==='baseline')renderBaseline(exp);
}

async function setDebugMode(enabled){
  stopDebugFollow();
  const body=new URLSearchParams();
  body.set('enabled', enabled ? 'true' : 'false');
  const r=await adminFetch('/api/admin/debug-mode',{method:'POST',body});
  if(!r.ok){
    toast('日志开关更新失败','err');
    return;
  }
  const data=await r.json();
  debugEnabled=!!data.enabled;
  updateDebugControls();
  await loadDebugPage({live:true,silent:true});
}

async function checkDebugHealth(){
  stopDebugFollow();
  setDebugOutput('检测模型状态中...');
  const r=await adminFetch('/api/admin/debug-health');
  const data=await r.json();
  updatePyfeatStatus(data);
  setDebugOutput(JSON.stringify(data,null,2));
}

async function refreshPyfeatStatus(){
  if(!$('pyfeat-status'))return;
  const r=await adminFetch('/api/admin/debug-health');
  updatePyfeatStatus(await r.json());
}

function updatePyfeatStatus(data={}){
  const el=$('pyfeat-status');
  if(!el)return;
  el.className='debug-status-card '+(data.ok?'ok':'err');

function debugParams(before=null){
  const params=new URLSearchParams();
  params.set('limit',String(DEBUG_LIMIT));
  if(before!==null&&before!==undefined)params.set('before',String(before));
  const q=$('debug-search')?.value.trim();
  const participant=$('debug-participant')?.value.trim();
  const sid=$('debug-session')?.value.trim();
  const kind=$('debug-kind')?.value;
  if(q)params.set('q',q);
  if(participant)params.set('participant_id',participant);
  if(sid)params.set('session_id',sid);
  if(kind)params.set('kind',kind);
  return params;
}

function scheduleDebugReload(){
  clearTimeout(debugFilterTimer);
  debugFilterTimer=setTimeout(()=>reloadDebug(),350);
}

async function reloadDebug(){
  debugAutoFollow=false;
  await loadDebugPage({reset:true});
}

async function loadMoreDebug(){
  if(!debugHasMore||debugBefore===null)return;
  await loadDebugPage({reset:false,before:debugBefore});
}

async function loadDebugPage({reset=false,before=null,live=false,silent=false}={}){
  if(debugLoading||!$('debug-rows'))return;
  debugLoading=true;
  try{
    const params=debugParams(reset?null:before);
    const r=await adminFetch(`/api/admin/debug?${params.toString()}`);
    const data=await r.json();
    debugEnabled=!!data.enabled;
    const events=data.events||[];
    if(reset){
      debugBefore=data.next_before??null;
      debugHasMore=!!data.has_more;
      debugEvents=events;
    }else if(live){
      const incomingIds=new Set(events.map(e=>String(e.id)));
      debugEvents=events.concat(debugEvents.filter(e=>!incomingIds.has(String(e.id))));
      if(debugBefore===null){
        debugBefore=data.next_before??null;
        debugHasMore=!!data.has_more;
      }
    }else{
      debugBefore=data.next_before??null;
      debugHasMore=!!data.has_more;
      const seen=new Set(debugEvents.map(e=>String(e.id)));
      debugEvents=debugEvents.concat(events.filter(e=>!seen.has(String(e.id))));
    }
    updateDebugControls(data);
    renderDebugRows();
  }finally{
    debugLoading=false;
  }
}

function updateDebugControls(data={}){
  const btn=$('debug-toggle');
  if(btn){
    btn.className=debugEnabled?'danger':'primary';
    btn.textContent=debugEnabled?'关闭日志记录':'开启日志记录';
  }
}

function renderDebugRows(){
  const scroll=$('debug-scroll');
  const keepTop=debugAutoFollow&&scroll;
  const rows=debugEvents.map(e=>{
    const kb=e.bytes?Math.round(e.bytes/1024*10)/10:'';
    return `
      <tr>
        <td>${escHtml(e.ts||'')}</td>
        <td>${escHtml(e.kind||'')}</td>
        <td>${escHtml(e.participant_id||'')}</td>
        <td>${e.session_id??''}</td>
        <td>${kb}</td>
        <td>${e.elapsed_ms??''}</td>
        <td>${e.face_detected?'yes':'no'}</td>
        <td>${e.reliable?'yes':'no'}</td>
        <td>${escHtml(e.message||'')}</td>
        <td>
          <details class="debug-details" ontoggle="loadDebugDetail(this,${Number(e.id??0)})">
            <summary>展开</summary>
            <div class="debug-detail-body">加载详情中...</div>
          </details>
        </td>
      </tr>`;
  }).join('');
  $('debug-rows').innerHTML=rows||'<tr><td colspan="10" style="text-align:center;color:#64748b;padding:24px">没有匹配的日志</td></tr>';
  if(keepTop)scroll.scrollTop=0;
}

async function loadDebugDetail(el,eventId){
  stopDebugFollow();
  if(!el.open||el.dataset.loaded==='1')return;
  const body=el.querySelector('.debug-detail-body');
  try{
    const r=await adminFetch(`/api/admin/debug-event/${eventId}`);
    const e=await r.json();
    body.innerHTML=renderDebugDetail(e);
    el.dataset.loaded='1';
  }catch(err){
    body.textContent='详情加载失败';
  }
}

function renderDebugDetail(e){
  const kb=e.bytes?Math.round(e.bytes/1024*10)/10:'';
  const api=e.api_response===undefined?null:e.api_response;
  const apiJson=api===null?'No API response recorded':JSON.stringify(api,null,2);
  const eventJson=JSON.stringify({...e,image:e.image?'[image omitted from event json]':undefined},null,2);
  const image=e.image?`
    <div class="debug-face">
      <img src="${escAttr(e.image)}" alt="captured frame">
      <div>
        <div style="color:#94a3b8;line-height:1.6">
          Captured frame sent to PyFeat.<br>
          Payload: ${kb||0} KB · Time: ${e.elapsed_ms??''} ms
        </div>
        <a href="${escAttr(e.image)}" download="debug-${escAttr(e.participant_id||'unknown')}-${escAttr(e.session_id??'none')}-${escAttr(e.ts||e.id)}.jpg">下载图片</a>
      </div>
    </div>`:'<div style="color:#64748b;margin-top:8px">这个事件没有图片。</div>';
  return `
    ${image}
    <pre>${escHtml(apiJson)}</pre>
    <details class="debug-details" style="margin-top:8px">
      <summary>完整日志事件</summary>
      <pre>${escHtml(eventJson)}</pre>
    </details>`;
}

function bindDebugScroll(){
  const el=$('debug-scroll');
  if(!el)return;
  ['wheel','touchstart','mousedown','keydown'].forEach(type=>{
    el.addEventListener(type,stopDebugFollow,{passive:true});
  });
  el.addEventListener('scroll',()=>{
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-120){
      loadMoreDebug();
    }
  });
}

function stopDebugFollow(){
  debugAutoFollow=false;
}

function startDebugTimers(){
  stopDebugTimers();
  debugPollTimer=setInterval(()=>loadDebugPage({live:true,silent:true}),DEBUG_POLL_MS);
  debugHealthTimer=setInterval(refreshPyfeatStatus,DEBUG_HEALTH_MS);
  debugCacheTimer=setInterval(refreshDebugCache,DEBUG_HEALTH_MS);

function stopDebugTimers(){

      <div class="info-card"><div class="lbl">基线 AU12</div><div class="val mono">${p.baseline_au12?.toFixed(3)||'-'}</div></div>
      <div class="info-card"><div class="lbl">基线帧数</div><div class="val mono">${p.baseline_frame_count||0}</div></div>
    </div>
    <div style="margin-top:20px;padding:16px;background:#0f172a;border:1px solid #334155;border-radius:10px">
      <p style="font-size:.75em;color:#64748b;margin-bottom:8px">基线 AU 向量 (用于偏差计算)</p>
      <div style="display:flex;gap:24px;font-family:monospace;font-size:.9em">
        <div><span style="color:#818cf8">AU1</span> <strong>${p.baseline_au1?.toFixed(3)||'-'}</strong></div>
        <div><span style="color:#ef4444">AU4</span> <strong>${p.baseline_au4?.toFixed(3)||'-'}</strong></div>
        <div><span style="color:#f59e0b">AU7</span> <strong>${p.baseline_au7?.toFixed(3)||'-'}</strong></div>
        <div><span style="color:#22c55e">AU12</span> <strong>${p.baseline_au12?.toFixed(3)||'-'}</strong></div>
      </div>
    </div>`;
  }
  // Also show the session's expression stats summary
  $('detail').innerHTML=html;
}

// ── Export ──
function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
async function exportSession(sid){
  const r=await adminFetch(`/api/admin/sessions/${sid}/export`);
  const data=await r.json();
  downloadJSON(data,`session_${sid}_${data.session.participant_id}.json`);
  toast('导出 JSON 完成','ok');
}
function exportSessionCSV(sid){
  const {exp}=sessionCache[sid]||{};
  if(!exp)return;
  const logs=exp.chat_logs||[];
  let csv='seq,role,content,timestamp,expression_label,strategy_applied\n';
  for(const l of logs){
    csv+=`${l.seq},"${l.role}","${(l.content||'').replace(/"/g,'""')}","${l.timestamp}","${l.expression_label||''}","${l.strategy_applied||''}"\n`;
  }
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`session_${sid}_chat.csv`;a.click();
  toast('导出 CSV 完成','ok');
}
async function exportExpressionCSV(sid){
  const r=await adminFetch(`/api/admin/expression/${sid}/stats`);
  const st=await r.json();
  const frames=st.frames||[];
  let csv='time_s,au1,au4,au7,au12,head_yaw,head_pitch,face_detected,reliable\n';
  for(const f of frames){
    csv+=`${f.t},${f.au1},${f.au4},${f.au7},${f.au12},${f.yaw},${f.pitch},${f.face},${f.ok}\n`;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`session_${sid}_expression.csv`;a.click();
  toast('导出 AU CSV 完成','ok');
}

// ── Delete ──
function confirmDelete(sid,pid){
  $('modal-overlay').classList.remove('hidden');
  $('modal-overlay').querySelector('.modal').innerHTML=`
    <h3>删除 Session #${sid}</h3>
    <p>确定删除 <strong>${escHtml(pid)}</strong> 的 Session #${sid}？<br>
    这将同时删除所有关联的聊天记录、表情数据、问卷和评估结果。<br><br>
    <span style="color:#ef4444">此操作不可撤销。</span></p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeModal()">取消</button>
      <button class="danger" onclick="doDelete(${sid})">确认删除</button>
    </div>
  `;
}
function closeModal(){$('modal-overlay').classList.add('hidden')}
async function doDelete(sid){
  const r=await adminFetch(`/api/admin/sessions/${sid}`,{method:'DELETE'});
  if(r.ok){
    closeModal();
    activeSid=null;
    activeTab='debug';
    setActiveTab(activeTab);
    renderDebug();
    toast('已删除','ok');
    refresh();
  }else{
    toast('删除失败','err');
  }
}

// ── Toast ──
function toast(msg,type='ok'){
  const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;
  $('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ── Helpers ──
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return escHtml(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ── Init ──
initAuth();
</script>
