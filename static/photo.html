<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手机录像同步</title>
  <link rel="stylesheet" href="/static/dist/photo.css?v=__ASSET_VERSION__">
</head>
<body>
  <main class="photo-page">
    <header class="page-header">
      <div>
        <p class="eyebrow">Temporary photo relay</p>
        <h1>手机录像同步</h1>
        <p class="subtitle">电脑先进入等待页，手机再打开摄像头并开始传输。</p>
      </div>
      <a class="quiet-link" href="/">返回 demo</a>
    </header>

    <section id="role-view" class="panel">
      <h2>选择设备</h2>
      <div class="role-actions">
        <button id="choose-computer" class="role-button" type="button">
          <strong>电脑</strong>
          <span>等待手机传来画面</span>
        </button>
        <button id="choose-phone" class="role-button" type="button">
          <strong>手机</strong>
          <span>请求摄像头并开始录像</span>
        </button>
      </div>
      <p class="hint">手机端只采集画面，不采集音频。默认请求 1920×1080、30fps。</p>
    </section>

    <section id="computer-view" class="panel hidden">
      <div class="view-header">
        <div>
          <p class="eyebrow">Computer</p>
          <h2>等待手机传输</h2>
        </div>
        <div class="header-actions">
          <div class="status-line"><span class="status-dot"></span><span id="computer-status">正在连接</span></div>
          <button id="computer-reset" class="text-button" type="button">重新选择</button>
        </div>
      </div>
      <div class="video-shell">
        <video id="received-video" controls playsinline></video>
        <div id="computer-placeholder" class="video-placeholder">
          <strong>等待手机</strong>
          <span>手机开始录像后，画面会出现在这里。</span>
        </div>
      </div>
      <div class="transfer-row">
        <span id="computer-meta">尚未收到视频</span>
        <a id="download-video" class="download-link hidden" download="phone-recording.webm">下载录像</a>
      </div>
    </section>

    <section id="phone-view" class="panel hidden">
      <div class="view-header">
        <div>
          <p class="eyebrow">Phone</p>
          <h2>手机录像</h2>
        </div>
        <div class="header-actions">
          <div class="status-line"><span class="status-dot"></span><span id="phone-status">正在准备摄像头</span></div>
          <button id="phone-reset" class="text-button" type="button">重新选择</button>
        </div>
      </div>
      <div class="video-shell phone-shell">
        <video id="phone-preview" autoplay playsinline muted></video>
      </div>
      <div class="phone-meta">
        <span id="phone-settings">正在获取摄像头设置</span>
        <span id="phone-transfer">已发送 0 B</span>
      </div>
      <div class="phone-actions">
        <div class="phone-action-group">
          <button id="use-native-camera" class="secondary-button" type="button">调用系统相机</button>
          <span class="phone-camera-note">结束后上传，可能保留系统美颜；音频由系统相机决定。</span>
        </div>
        <button id="stop-recording" class="primary-button" type="button" disabled>停止录像</button>
      </div>
      <input id="native-camera-input" type="file" accept="video/*" capture="environment" hidden>
    </section>

    <p id="global-error" class="global-error hidden" role="alert"></p>
  </main>

  <script type="module" src="/static/dist/photo.js?v=__ASSET_VERSION__"></script>
</body>
</html>
