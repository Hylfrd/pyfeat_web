name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Check Python
        run: python -m compileall app

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Check repository hygiene
        shell: bash
        run: |
          blocked="$(find . -maxdepth 1 -type f \( \
            -iname 'clear_*participants*.ps1' -o \
            -iname 'clear_*demo*.ps1' -o \
            -iname 'cleanup_*participants*.ps1' -o \
            -iname 'cleanup_*demo*.ps1' -o \
            -iname 'deploy_restart.ps1' -o \
            -iname 'install_server_deps.bat' -o \
            -iname 'install_windows_task.ps1' -o \
            -iname 'run_server.cmd' -o \
            -iname 'start_server.bat' \
          \) -print)"
          if [ -n "$blocked" ]; then
            echo "Do not commit one-off data maintenance scripts:"
            echo "$blocked"
            exit 1
          fi

      - name: Deploy files to server
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "app/**,static/**,requirements.txt,deploy.ps1,Caddyfile.example"
          target: "/c/web/"
          tar_dereference: true
          overwrite: true

      - name: Restart server app
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:/web/deploy.ps1
