name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check Python
        run: python -m compileall app

      - name: Deploy files to server
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "app/**,static/**,requirements.txt,install_server_deps.bat,install_windows_task.ps1,deploy_restart.ps1,run_server.cmd,start_server.bat,Caddyfile.example"
          target: "/c/web/"
          tar_dereference: true
          overwrite: true

      - name: Restart server app
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:/web/deploy_restart.ps1
