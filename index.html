<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PyFeat Demo</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-spacer"></div>
      <nav class="header-actions" aria-label="工具">
        <a
          class="icon-link"
          href="https://github.com/Hylfrd/pyfeat_web"
          target="_blank"
          rel="noreferrer"
          aria-label="GitHub"
          title="GitHub"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.2-1.7-1.2-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 .1.8 2.1 2.9 1.5.1-.7.4-1.2.7-1.5-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0C17 5.5 18 5.8 18 5.8c.6 1.6.2 2.9.1 3.2.8.9 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1.1.8 2.2v3.2c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z" />
          </svg>
        </a>
        <button id="themeButton" class="theme-button" type="button" aria-label="切换明暗模式" title="切换明暗模式">
          <span class="theme-icon" aria-hidden="true"></span>
        </button>
      </nav>
    </header>

    <main class="app-shell">
      <section class="camera-pane" aria-label="摄像头预览">
        <div class="pane-header">
          <h1>PyFeat Camera Demo</h1>
          <button id="cameraButton" class="primary-button" type="button">Start Camera</button>
        </div>
        <div class="preview-frame">
          <video id="cameraPreview" autoplay playsinline muted></video>
          <div id="previewPlaceholder" class="preview-placeholder">Camera preview</div>
        </div>
        <canvas id="captureCanvas" hidden></canvas>
      </section>

      <aside class="log-pane" aria-label="日志">
        <div class="pane-header">
          <h2>Logs</h2>
          <span id="statusText" class="status-text">Idle</span>
        </div>
        <pre id="logOutput" class="log-output"></pre>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <span>HMCL Helper By Hylfrd</span>
        <span class="site-footer-sep">|</span>
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noreferrer">粤ICP备2025433394号-1</a>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
